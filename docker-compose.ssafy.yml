# SSAFY 서버(k14d103.p.ssafy.io) 전용 compose 파일
# Jenkins S14P31D103 job이 frontend/dev 브랜치 push 시 자동 배포.
#
# 배포 위치: /home/ubuntu/app/frontend
# 외부 노출: nginx가 https://k14d103.p.ssafy.io → 127.0.0.1:3000 프록시
# 백엔드와 별도 네트워크 — API는 브라우저가 nginx 경유 /api 호출.
#
# 수동 사용:
#   docker compose -f docker-compose.ssafy.yml build
#   docker compose -f docker-compose.ssafy.yml up -d
#   docker compose -f docker-compose.ssafy.yml logs -f frontend
#   docker compose -f docker-compose.ssafy.yml down

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: aiground-frontend:latest
    container_name: aiground-frontend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      # localhost만 바인드 — nginx가 외부 노출 담당
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
